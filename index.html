<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Net-Troubleshooter | Console</title>
    <!-- Ruta relativa corregida para GitHub Pages -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Efecto visual de monitor antiguo -->
    <div class="monitor-effect"></div>
    
    <div class="terminal">
        <header class="terminal-header">
            <div class="status-dot"></div>
            <span>MaiteOS v1.0.2 - Terminal de Diagnóstico de Red</span>
        </header>
        
        <div id="output">
            <p>> Sistema iniciado correctamente.</p>
            <p>> Estado de la red: [!] CRÍTICO</p>
            <p>> Escribe 'ayuda' para ver comandos disponibles.</p>
        </div>
        
        <div class="input-line">
            <span class="prompt">root@network-troubleshooter:~$</span>
            <input type="text" id="command-input" autofocus autocomplete="off">
        </div>
    </div>

    <!-- Ruta relativa del script corregida (sin la barra inicial) -->
    <script src="js/script.js"></script>
</body>
</html>
